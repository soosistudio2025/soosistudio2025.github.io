    // ====== Breadcrumbs & API Failure Tracker ======
const MAX_BREADCRUMBS = 30;
const MAX_API_FAILS = 20;

const breadcrumbs = [];
const apiFailures = [];

// 記錄 Breadcrumb
function addBreadcrumb(type, data = {}) {
  breadcrumbs.push({
    time: new Date().toISOString(),
    type,
    ...data
  });
  if (breadcrumbs.length > MAX_BREADCRUMBS) breadcrumbs.shift();
}

// 取得 Breadcrumbs
function getBreadcrumbs() {
  return breadcrumbs.slice();
}

// 記錄失敗 API
function addApiFailure(data = {}) {
  apiFailures.push({
    time: new Date().toISOString(),
    ...data
  });
  if (apiFailures.length > MAX_API_FAILS) apiFailures.shift();
}

// 取得 API Failures
function getApiFailures() {
  return apiFailures.slice();
}

// ---- 監聽 click
document.addEventListener("click", (e) => {
  const t = e.target;
  addBreadcrumb("click", {
    tag: t.tagName,
    id: t.id || "",
    class: t.className || "",
    text: (t.innerText || "").slice(0, 50)
  });
}, true);

// ---- 監聽 route 變化（SPA）
(function() {
  const push = history.pushState;
  const replace = history.replaceState;

  history.pushState = function() {
    addBreadcrumb("route", { url: location.href });
    return push.apply(this, arguments);
  };
  history.replaceState = function() {
    addBreadcrumb("route", { url: location.href });
    return replace.apply(this, arguments);
  };
  window.addEventListener("popstate", () => {
    addBreadcrumb("route", { url: location.href });
  });
})();

// ---- 監聽 fetch 失敗
const originalFetch = window.fetch;
window.fetch = async (...args) => {
  const [url, options] = args;
  try {
    const res = await originalFetch(...args);
    if (!res.ok) {
      addApiFailure({
        url: typeof url === "string" ? url : url.url,
        method: (options && options.method) || "GET",
        status: res.status,
        statusText: res.statusText
      });
    }
    return res;
  } catch (err) {
    addApiFailure({
      url: typeof url === "string" ? url : url.url,
      method: (options && options.method) || "GET",
      error: String(err)
    });
    throw err;
  }
};
const wait = (ms) => new Promise(r => setTimeout(r, ms));

const withTimeout = (promise, ms = 20000) =>
    new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("連線逾時，請確認網路")), ms);
        promise.then(res => { clearTimeout(timer); resolve(res); })
               .catch(err => { clearTimeout(timer); reject(err); });
    });

const retry = async (fn, times = 2) => {
    let lastErr;
    for (let i = 0; i < times; i++) {
        try { return await fn(i); }
        catch (e) { lastErr = e; await wait(1000); }
    }
    throw lastErr;
};

        );

        return data;
    }, 2);

    constructor(props) {
        super(props);
        this.state = { hasError: false };
    }

    static getDerivedStateFromError(error) {
        return { hasError: true };
    }

    componentDidCatch(error, info) {
        console.error("❌ React Error:", error, info);

        // ✅ 這行會觸發你原本的自動寄錯誤功能

            error?.message || "React Error",

            "react"

        // ✅ 讓 showFatalError 直接接管畫面（不要再顯示手動複製版）
        if (this.state.hasError) return null;
        return this.props.children;
    }

                // 1. 優先使用資料庫欄位 (r.service_type)，若無則找 JSON 內的

                const isBoardingRecord =

            const petsGroup = {};

            // 依照時間排序 (最新的在前)
            data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            data.forEach(r => {
                // 判斷服務類型

                const innerData = r.raw_data.raw_data || r.raw_data || {};
                const jsonType = innerData.service_type || r.raw_data.service_type || '';

                        name: petName, 
                        grooming: null, 
                        boarding: null,
                        lastSeen: finalRecord.created_at // 用於排序寵物列表
                    };

                if (source === 'grooming' && !petsGroup[petName].grooming) {

                        </TermsModal>

                        {/* 4. 高風險住宿 Modal */}
    <TermsModal isOpen={activeModal === 'highRiskBoarding'} onClose={()=>setActiveModal(null)} title="高風險住宿服務風險告知" onAgree={()=>setTermsRead(p=>({...p, highRiskBoarding:true}))}>
                            <div className="space-y-5 text-sm text-soosi-dark leading-relaxed">
                                {/* Warning Box - 最重要的無24H */}
                                <div className="bg-soosi-red text-white p-4 rounded-xl shadow-md text-center">
                                    <h4 className="font-black text-lg mb-1">⚠️ 重要告知：無 24 小時照護</h4>
                                    <p className="text-xs font-bold opacity-90">住宿期間晚上無人駐店，若發生突發狀況店家無法即時處置。</p>
                                </div>

                                {/* 一、健康風險免責 */}
                                <div className="space-y-2">
                                    <h5 className="font-black text-soosi-wood border-l-4 border-soosi-wood pl-2">一、健康與遺傳風險免責</h5>
                                    <div className="text-xs space-y-2">
                                        <p>若因以下因素導致寵物疾病發作、意外休克或死亡，<span className="font-bold text-soosi-red">概與本工作室無關</span>：</p>
                                        <ul className="list-disc pl-5 text-gray-600">
                                            <li>基因或遺傳問題。</li>
                                            <li>天生病史、高齡犬貓或幼犬貓。</li>
                                            <li>飼主隱瞞病情或已知風險仍堅持住宿。</li>
                                        </ul>
                                    </div>
                                </div>

                                {/* 二、緊急送醫與費用 */}
                                <div className="space-y-2">
                                    <h5 className="font-black text-soosi-wood border-l-4 border-soosi-wood pl-2">二、緊急送醫與費用</h5>
                                    <p className="text-xs">若發生上述意外，工作室將立即送往附近動物醫院救治。送醫途中或治療所產生之所有費用，皆由飼主全額負擔。</p>
                                </div>

                                {/* 三、夜間無人與情緒風險 (再次強調) */}
                                <div className="bg-red-50 p-3 rounded-lg border border-red-100 space-y-2">
                                    <h5 className="font-black text-soosi-red text-xs">⛔ 夜間與情緒風險特別聲明</h5>
                                    <ul className="list-disc pl-5 text-xs text-soosi-dark">
                                        <li>飼主已知本工作室<span className="font-bold">無 24 小時服務</span>。</li>
                                        <li>夜間無人照護時，若因寵物本身焦慮、情緒不穩導致自殘或受傷，或因急病無法即時救治，<span className="font-bold">與本工作室無關</span>。</li>
                                    </ul>
                                </div>

                                {/* 四、法律效力 */}
                                <div className="text-xs text-gray-500 bg-gray-50 p-3 rounded-lg">
                                    <span className="font-bold">法律效力確認：</span>
                                    倘若發生法律糾紛或訴訟，本切結書將作為雙方權利義務之重要依據，並呈交相關法律部門佐證。
                                </div>
                            </div>
                        </TermsModal>
                        {/* 6. 住宿價目表 Modal (圖片版) */}
                        <BoardingPriceModal isOpen={activeModal === 'boardingPrice'} onClose={()=>setActiveModal(null)} />
                    </div>
                );
    };

ReactDOM.createRoot(document.getElementById('root')).render(
    <ErrorBoundary>
        <App />
    </ErrorBoundary>
);
        </script>
    </body>
    </html>
